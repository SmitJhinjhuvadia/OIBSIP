<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #dfe0e6;
      --calc-bg: #f0f0f5;
      --display-bg: #1c1c1e;
      --btn-num: #ffffff;
      --btn-util: #c8c8d0;
      --btn-op: #ff9f0a;
      --btn-op-active-bg: #ffffff;
      --btn-op-active-color: #ff9f0a;
      --text-num: #1c1c1e;
      --text-util: #3a3a3c;
      --text-op: #ffffff;
      --display-main: #ffffff;
      --display-sub: #636366;
      --accent: #ff9f0a;
      --gap: 10px;
      --btn-r: 14px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', -apple-system, sans-serif;
    }

    .calculator {
      background: var(--calc-bg);
      border-radius: 24px;
      box-shadow: 0 28px 72px rgba(0,0,0,.20), 0 2px 6px rgba(0,0,0,.08);
      width: 320px;
      overflow: hidden;
      position: relative;
    }

    /* clock icon strip тАФ own row above numbers */
    .display-topbar {
      background: var(--display-bg);
      padding: 10px 13px 0;
      display: flex;
      justify-content: flex-end;
    }

    .history-icon-btn {
      background: rgba(255,255,255,.08);
      border: none;
      cursor: pointer;
      padding: 5px 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      transition: background .15s;
      color: #5e5e63;
      height: auto; width: auto; aspect-ratio: unset;
    }
    .history-icon-btn:hover { background: rgba(255,255,255,.16); color: #aeaeb2; }

    /* display тАФ numbers only, no overlap */
    .display {
      background: var(--display-bg);
      padding: 4px 16px 20px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 4px;
    }

    .display-expr {
      font-size: 13px;
      color: var(--display-sub);
      font-weight: 300;
      min-height: 18px;
      text-align: right;
      word-break: break-all;
      width: 100%;
    }
    .display-val {
      font-size: 52px;
      font-weight: 200;
      color: var(--display-main);
      letter-spacing: -.02em;
      line-height: 1;
      text-align: right;
      word-break: break-all;
      width: 100%;
      transition: font-size .1s;
    }
    .display-val.shrink  { font-size: 34px; }
    .display-val.shrink2 { font-size: 24px; }
    .display-val.error   { color: #ff453a; font-size: 26px; font-weight: 300; }

    /* button grid */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--gap);
      padding: 14px 14px 16px;
    }

    button {
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 64px;
      border-radius: var(--btn-r);
      font-size: 19px;
      font-weight: 400;
      transition: filter .1s, transform .08s;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    button:active { transform: scale(.94); filter: brightness(.86); }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .btn-num  { background: var(--btn-num); color: var(--text-num); box-shadow: 0 2px 6px rgba(0,0,0,.10); }
    .btn-zero { grid-column: span 2; justify-content: flex-start; padding-left: 24px; }
    .btn-util { background: var(--btn-util); color: var(--text-util); font-size: 15px; font-weight: 500; }
    .btn-op   { background: var(--btn-op); color: var(--text-op); font-size: 24px; font-weight: 300; }
    .btn-op.active { background: var(--btn-op-active-bg); color: var(--btn-op-active-color); }
    .btn-eq   { background: var(--btn-op); color: #fff; font-size: 24px; font-weight: 300; }

    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(0,0,0,.10);
      transform: scale(0);
      animation: rpl .35s linear;
      pointer-events: none;
    }
    @keyframes rpl { to { transform: scale(5); opacity: 0; } }

    /* history overlay */
    .history-overlay {
      position: absolute; inset: 0;
      background: rgba(240,240,245,.97);
      border-radius: 24px;
      display: flex; flex-direction: column;
      z-index: 10;
      opacity: 0; pointer-events: none;
      transform: translateY(10px);
      transition: opacity .2s ease, transform .2s ease;
    }
    .history-overlay.open { opacity: 1; pointer-events: all; transform: translateY(0); }

    .history-overlay-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px 12px;
      border-bottom: 1px solid rgba(0,0,0,.08);
    }
    .history-overlay-header h3 {
      font-size: 13px; font-weight: 600;
      letter-spacing: .07em; text-transform: uppercase; color: #8e8e93;
    }
    .history-close {
      background: none; border: none; cursor: pointer;
      color: #8e8e93; font-size: 22px; line-height: 1;
      padding: 2px 7px; border-radius: 6px;
      transition: background .12s, color .12s;
      height: auto; width: auto; aspect-ratio: unset;
    }
    .history-close:hover { background: rgba(0,0,0,.07); color: #1c1c1e; }

    .history-list {
      flex: 1; overflow-y: auto; padding: 6px 0;
      scrollbar-width: thin; scrollbar-color: #c7c7cc transparent;
    }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 4px; }

    .history-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 10px;
      color: #aeaeb2; padding: 40px 20px; text-align: center;
    }
    .history-empty p { font-size: 13px; line-height: 1.6; }

    .history-item {
      padding: 10px 18px;
      border-bottom: 1px solid rgba(0,0,0,.06);
      cursor: pointer; transition: background .12s;
    }
    .history-item:hover { background: rgba(0,0,0,.04); }
    .history-item:last-child { border-bottom: none; }
    .h-expr   { font-size: 11px; color: #8e8e93; margin-bottom: 2px; word-break: break-all; }
    .h-result { font-size: 22px; font-weight: 300; color: #1c1c1e; text-align: right; word-break: break-all; }

    .history-footer { padding: 10px 14px 14px; border-top: 1px solid rgba(0,0,0,.07); }
    .history-clear-btn {
      width: 100%; background: none;
      border: 1px solid rgba(0,0,0,.12); border-radius: 10px;
      color: #8e8e93; font-size: 12px; font-weight: 500;
      letter-spacing: .05em; cursor: pointer;
      padding: 8px; height: auto; aspect-ratio: unset;
      transition: background .12s, color .12s;
    }
    .history-clear-btn:hover { background: rgba(0,0,0,.06); color: #1c1c1e; }
  </style>
</head>
<body>

<div class="calculator" id="calcWrap">

  <div class="history-overlay" id="historyOverlay">
    <div class="history-overlay-header">
      <h3>History</h3>
      <button class="history-close" id="historyClose">├Ч</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty" id="historyEmpty">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#c7c7cc" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <p>No calculations yet.<br>Results will appear here.</p>
      </div>
    </div>
    <div class="history-footer">
      <button class="history-clear-btn" id="historyClear">CLEAR HISTORY</button>
    </div>
  </div>

  <div class="display-topbar">
    <button class="history-icon-btn" id="historyToggle" title="History">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </button>
  </div>

  <div class="display">
    <div class="display-expr" id="expr"></div>
    <div class="display-val" id="val">0</div>
  </div>

  <div class="btn-grid" id="btnGrid">
    <button class="btn-util" data-action="clear">AC</button>
    <button class="btn-util" data-action="sign">+/тИТ</button>
    <button class="btn-util" data-action="percent">%</button>
    <button class="btn-op"   data-action="op" data-op="/">├╖</button>

    <button class="btn-num" data-action="digit" data-val="7">7</button>
    <button class="btn-num" data-action="digit" data-val="8">8</button>
    <button class="btn-num" data-action="digit" data-val="9">9</button>
    <button class="btn-op"  data-action="op" data-op="*">├Ч</button>

    <button class="btn-num" data-action="digit" data-val="4">4</button>
    <button class="btn-num" data-action="digit" data-val="5">5</button>
    <button class="btn-num" data-action="digit" data-val="6">6</button>
    <button class="btn-op"  data-action="op" data-op="-">тИТ</button>

    <button class="btn-num" data-action="digit" data-val="1">1</button>
    <button class="btn-num" data-action="digit" data-val="2">2</button>
    <button class="btn-num" data-action="digit" data-val="3">3</button>
    <button class="btn-op"  data-action="op" data-op="+">+</button>

    <button class="btn-num btn-zero" data-action="digit" data-val="0">0</button>
    <button class="btn-num" data-action="decimal">.</button>
    <button class="btn-eq"  data-action="equals">=</button>
  </div>

</div>

<script>
  let current = '0', prev = null, op = null, justEvald = false;
  const history = [];

  const valEl  = document.getElementById('val');
  const exprEl = document.getElementById('expr');
  const hList  = document.getElementById('historyList');
  const hEmpty = document.getElementById('historyEmpty');
  const overlay = document.getElementById('historyOverlay');

  document.getElementById('historyToggle').addEventListener('click', () => overlay.classList.add('open'));
  document.getElementById('historyClose').addEventListener('click',  () => overlay.classList.remove('open'));
  document.getElementById('historyClear').addEventListener('click',  () => { history.length = 0; renderHistory(); });

  /* тФАтФА format: max 6 decimal places, trims trailing zeros, exp for huge nums тФАтФА */
  function format(n) {
    if (n === 'Error' || n === '' || n == null) return 'Error';
    const num = parseFloat(n);
    if (isNaN(num)) return 'Error';
    if (!isFinite(num)) return num > 0 ? 'тИЮ' : 'Error';

    // Round to 6 decimal places (fixes float noise like 0.1+0.2)
    const rounded = parseFloat(num.toFixed(6));
    let s = rounded.toString();

    // Switch to exponential only for very large/small numbers
    if (Math.abs(rounded) >= 1e13 || (Math.abs(rounded) < 1e-6 && rounded !== 0)) {
      s = num.toExponential(4);
    }
    return s;
  }

  /* тФАтФА render display тФАтФА */
  function render() {
    valEl.classList.remove('error', 'shrink', 'shrink2');
    const txt = format(current);
    valEl.textContent = txt;
    const len = txt.replace('-', '').length;
    if (len > 13) valEl.classList.add('shrink2');
    else if (len > 9) valEl.classList.add('shrink');
  }

  function setError(msg = 'Error') {
    current = 'Error'; exprEl.textContent = '';
    valEl.classList.remove('shrink', 'shrink2'); valEl.classList.add('error');
    valEl.textContent = msg;
    prev = null; op = null; justEvald = false;
    clearActiveOp();
  }

  /* тФАтФА operator highlight тФАтФА */
  function clearActiveOp() { document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active')); }
  function highlightOp(sym) {
    clearActiveOp();
    document.querySelectorAll('[data-op]').forEach(b => { if (b.dataset.op === sym) b.classList.add('active'); });
  }

  /* тФАтФА input handlers тФАтФА */
  function handleDigit(d) {
    if (current === 'Error') { current = d; justEvald = false; render(); return; }
    if (justEvald) { current = d; justEvald = false; clearActiveOp(); }
    else current = (current === '0') ? d : current + d;
    if (current.replace('-','').replace('.','').length > 12) return;
    render();
  }

  function handleDecimal() {
    if (current === 'Error' || justEvald) { current = '0.'; justEvald = false; clearActiveOp(); render(); return; }
    if (!current.includes('.')) current += '.';
    render();
  }

  function handleOp(sym) {
    if (current === 'Error') return;
    if (prev !== null && !justEvald) { compute(); if (current === 'Error') return; }
    prev = parseFloat(current); op = sym; justEvald = false;
    const lbl = { '+':'+', '-':'тИТ', '*':'├Ч', '/':'├╖' }[sym];
    exprEl.textContent = `${format(String(prev))} ${lbl}`;
    current = '0'; highlightOp(sym); render();
  }

  /* тФАтФА core compute тФАтФА */
  function compute() {
    if (prev === null || op === null) return;
    const a = prev, b = parseFloat(current);
    if (op === '/' && b === 0) { setError('├╖ by 0'); return; }
    let result;
    switch (op) {
      case '+': result = a + b; break;
      case '-': result = a - b; break;
      case '*': result = a * b; break;
      case '/': result = a / b; break;
      default: return;
    }
    const lbl  = { '+':'+', '-':'тИТ', '*':'├Ч', '/':'├╖' }[op];
    const expr = `${format(String(a))} ${lbl} ${format(String(b))} =`;
    history.unshift({ expr, result });
    if (history.length > 30) history.pop();
    renderHistory();
    exprEl.textContent = expr;
    current = String(result); prev = null; op = null; justEvald = true;
    clearActiveOp(); render();
  }

  function handleClear()   { current='0'; prev=null; op=null; justEvald=false; exprEl.textContent=''; clearActiveOp(); render(); }
  function handleSign()    { if (current==='Error'||current==='0') return; current=String(parseFloat(current)*-1); render(); }
  function handlePercent() {
    if (current==='Error') return;
    current = (prev !== null && op !== null)
      ? String(prev * parseFloat(current) / 100)
      : String(parseFloat(current) / 100);
    render();
  }

  /* тФАтФА history render тФАтФА */
  function renderHistory() {
    if (history.length === 0) { hList.innerHTML = ''; hList.appendChild(hEmpty); return; }
    hList.innerHTML = history.map((h,i) =>
      `<div class="history-item" data-idx="${i}">
        <div class="h-expr">${h.expr}</div>
        <div class="h-result">${format(String(h.result))}</div>
      </div>`
    ).join('');
  }

  hList.addEventListener('click', e => {
    const item = e.target.closest('.history-item'); if (!item) return;
    const h = history[+item.dataset.idx];
    current = String(h.result); justEvald = true;
    exprEl.textContent = h.expr; render();
    overlay.classList.remove('open');
  });

  /* тФАтФА button clicks тФАтФА */
  document.getElementById('btnGrid').addEventListener('click', e => {
    const btn = e.target.closest('button'); if (!btn) return;
    ripple(btn, e);
    const { action, val, op: opSym } = btn.dataset;
    switch (action) {
      case 'digit':   handleDigit(val);  break;
      case 'decimal': handleDecimal();   break;
      case 'op':      handleOp(opSym);   break;
      case 'equals':  compute();         break;
      case 'clear':   handleClear();     break;
      case 'sign':    handleSign();      break;
      case 'percent': handlePercent();   break;
    }
  });

  /* тФАтФА keyboard тФАтФА */
  document.addEventListener('keydown', e => {
    if (e.key>='0'&&e.key<='9') { handleDigit(e.key); return; }
    switch(e.key) {
      case '.': case ',':  handleDecimal(); break;
      case '+':            handleOp('+');   break;
      case '-':            handleOp('-');   break;
      case '*':            handleOp('*');   break;
      case '/': e.preventDefault(); handleOp('/'); break;
      case 'Enter': case '=': compute();   break;
      case 'Backspace':
        if (current==='Error') { current='0'; render(); break; }
        if (justEvald) break;
        current = current.length>1 ? current.slice(0,-1) : '0'; render(); break;
      case 'Escape': handleClear(); break;
      case '%':      handlePercent(); break;
    }
  });

  /* тФАтФА ripple тФАтФА */
  function ripple(btn, e) {
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    btn.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  }

  render();
</script>
</body>
</html>
